<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>autodiscord ~ terminal</title>
    <style>
      :root {
        --bg: #000000;
        --bg2: #0b0b0b;
        --fg: #e6e6e6;       /* normal text  */
        --fg-dim: #888888;   /* dim / labels */
        --fg-bright: #ffffff;/* emphasis     */
        --border: #333333;
      }
      * { box-sizing: border-box; }
      body {
        width: 380px;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "SFMono-Regular", "Consolas", "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.5;
      }
      .titlebar {
        display: flex; align-items: center; gap: 8px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 6px 10px;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--fg-dim); }
      .titlebar .title { margin-left: 6px; color: var(--fg-dim); font-size: 11px; }
      .titlebar .status { margin-left: auto; font-size: 11px; color: var(--fg-dim); }
      .status.on { color: var(--fg-bright); }
      .status.off { color: var(--fg-dim); }
      .screen { padding: 10px 12px; }
      .line { white-space: pre-wrap; word-break: break-word; }
      .prompt { color: var(--fg-dim); }
      .comment { color: var(--fg-dim); }
      .bright { color: var(--fg-bright); }

      fieldset {
        border: 1px solid var(--border);
        border-radius: 3px;
        margin: 0 0 12px;
        padding: 8px 10px;
      }
      legend { color: var(--fg-dim); padding: 0 6px; font-size: 11px; }

      label.field { display: block; margin: 7px 0 3px; color: var(--fg-dim); }
      .chk { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--fg); margin: 4px 0; }
      select, input[type="text"], input[type="number"], textarea {
        width: 100%;
        background: #000;
        border: 1px solid var(--border);
        color: var(--fg);
        font-family: inherit;
        font-size: 12px;
        padding: 6px 8px;
        border-radius: 3px;
        outline: none;
      }
      select:focus, input:focus, textarea:focus { border-color: var(--fg); }
      textarea { min-height: 40px; resize: vertical; }
      input[type="checkbox"] { accent-color: var(--fg); }

      .rule { border: 1px solid var(--border); border-radius: 3px; padding: 7px; margin-bottom: 7px; background: #000; }
      .rule .row { display: flex; gap: 6px; align-items: center; margin-bottom: 5px; }
      .rule .row > input[type="text"] { flex: 1; }

      button {
        background: #000;
        color: var(--fg);
        border: 1px solid var(--fg-dim);
        font-family: inherit;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 3px;
        cursor: pointer;
      }
      button:hover { background: var(--fg); color: #000; }
      button.danger { border-color: var(--border); color: var(--fg-dim); padding: 3px 7px; }
      button.danger:hover { background: var(--fg-dim); color: #000; }
      .btn-row { display: flex; gap: 8px; }
      .btn-row button { flex: 1; }
      .full { width: 100%; }
      .inline-row { display: flex; gap: 6px; }
      .inline-row input { flex: 1; }
      .inline-row button { flex: 0 0 auto; }

      .console {
        background: #000;
        border: 1px solid var(--border);
        border-radius: 3px;
        height: 130px;
        overflow-y: auto;
        padding: 6px 8px;
        font-size: 11px;
        margin-top: 6px;
      }
      .console .l { white-space: pre-wrap; word-break: break-word; }
      .cursor::after { content: "_"; animation: blink 1s steps(1) infinite; color: var(--fg); }
      @keyframes blink { 50% { opacity: 0; } }
      .hint { color: var(--fg-dim); font-size: 10px; margin-top: 6px; }
      #discordStatus.ok { color: var(--fg-bright); }
      #discordStatus.bad { color: var(--fg-dim); }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="title">autodiscord@web:~</span>
      <span class="status off" id="masterStatus">[ DISABLED ]</span>
    </div>

    <div class="screen">
      <div class="line comment">// discord web auto-reply daemon</div>
      <div class="line"><span class="prompt">$</span> detect discord &rarr; <span id="discordStatus" class="bad">scanning…</span></div>

      <fieldset>
        <legend>master</legend>
        <label class="chk"><input type="checkbox" id="enabled" /> run daemon (keep discord tab open)</label>
        <div class="hint">runs while the tab is open — even unfocused / in background.</div>
      </fieldset>

      <fieldset>
        <legend>send-engine</legend>
        <label class="field">--method</label>
        <select id="sendMethod">
          <option value="paste">paste then enter (fast, like a macro)</option>
          <option value="type">auto-type then enter (per character)</option>
        </select>
        <label class="field">--type-speed (ms/char, type mode only)</label>
        <input type="number" id="typingDelay" min="0" max="500" value="25" />
        <label class="field">--test (send this text now to verify)</label>
        <div class="inline-row">
          <input type="text" id="testText" placeholder="test message" />
          <button id="sendNow">&gt;_ send</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>auto-reply</legend>
        <label class="chk"><input type="checkbox" id="replyEnabled" /> --enabled</label>
        <div id="rules"></div>
        <button id="addRule" class="full">+ add rule [contains -> reply]</button>
        <label class="field">--cooldown (seconds)</label>
        <input type="number" id="cooldown" min="0" value="3" />
        <div class="hint">rule: if msg contains "A" -> send "B"</div>
      </fieldset>

      <div class="btn-row">
        <button id="save">:w save</button>
        <button id="clearLog">clear log</button>
      </div>

      <div class="line comment" style="margin-top:10px;">// live activity</div>
      <div class="console" id="console"><div class="l comment cursor">awaiting events</div></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
